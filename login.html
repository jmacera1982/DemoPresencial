<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Acceso demo — Numia</title>
  <link rel="icon" type="image/png" href="images/N.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --numia-azul: #863DFF;
      --numia-azul-oscuro: #060A27;
    }
    body {
      font-family: 'Roboto', Arial, sans-serif;
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: linear-gradient(145deg, #eef2fc 0%, #f5f5f5 50%, #ede9fe 100%);
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(6, 10, 39, 0.15);
      overflow: hidden;
      background: #fff;
    }
    .login-head {
      background: var(--numia-azul-oscuro);
      color: #fff;
      padding: 1.5rem 1.75rem;
      text-align: center;
    }
    .login-head img {
      height: 36px;
      object-fit: contain;
      margin-bottom: 0.5rem;
    }
    .login-body {
      padding: 1.75rem;
    }
    .btn-entrar {
      background: var(--numia-azul);
      border: none;
      font-weight: 600;
      padding: 0.65rem 1.5rem;
    }
    .btn-entrar:hover {
      background: #6b2ecc;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-head">
      <img src="images/numia.png" alt="Numia" />
      <div class="fw-semibold">Acceso demo unificado</div>
      <div class="small opacity-75 mt-1">Tótem · App cliente · QR · App Salud</div>
    </div>
    <div class="login-body">
      <p class="text-muted small mb-3">
        Ingresá la misma contraseña que en el hub (<code>index.html</code>). La sesión vale para esta ventana del navegador.
      </p>
      <form id="formLogin" autocomplete="on">
        <div class="mb-3">
          <label class="form-label" for="pwd">Contraseña</label>
          <input type="password" class="form-control form-control-lg" id="pwd" name="password" required autocomplete="current-password" />
        </div>
        <div class="alert alert-danger py-2 small d-none" id="err" role="alert"></div>
        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-primary btn-entrar text-white" id="btnSubmit">
            <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
          </button>
          <a href="index.html" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-house me-1"></i>Volver al hub
          </a>
        </div>
      </form>
    </div>
  </div>
  <script src="auth-portal.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var nextRaw = params.get('next');
      var nextUrl = AuthPortal.safeNextUrl(nextRaw || 'index.html');

      document.getElementById('formLogin').addEventListener('submit', function (e) {
        e.preventDefault();
        var pwd = (document.getElementById('pwd').value || '').trim();
        var err = document.getElementById('err');
        err.classList.add('d-none');
        if (AuthPortal.login(pwd)) {
          window.location.replace(nextUrl);
        } else {
          err.textContent = 'Contraseña incorrecta.';
          err.classList.remove('d-none');
        }
      });
    })();
  </script>
</body>
</html>
